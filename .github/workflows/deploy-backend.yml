name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Pull latest code
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            if [ ! -d "/root/organza-store/.git" ]; then
              git clone git@github.com:suhaibbaba/organza-store.git /root/organza-store
            fi
            cd /root/organza-store
            git pull origin main

      - name: Write .env file
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: DATABASE_URL,JWT_SECRET,COOKIE_SECRET,REDIS_URL,STORE_CORS,ADMIN_CORS,AUTH_CORS
          script: |
            cat > /root/organza-store-env/.env-backend << EOF
            MEDUSA_ADMIN_ONBOARDING_TYPE=nextjs
            STORE_CORS=$STORE_CORS
            ADMIN_CORS=$ADMIN_CORS
            AUTH_CORS=$AUTH_CORS
            REDIS_URL=$REDIS_URL
            JWT_SECRET=$JWT_SECRET
            COOKIE_SECRET=$COOKIE_SECRET
            DATABASE_URL=$DATABASE_URL
            MEDUSA_ADMIN_ONBOARDING_NEXTJS_DIRECTORY=frontend
            NODE_ENV=production
            PORT=4100
            MEDUSA_WORKER_MODE=server
            DISABLE_MEDUSA_ADMIN=false  
            EOF
        env:
          DATABASE_URL: ${{ secrets.BACKEND_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.BACKEND_JWT_SECRET }}
          COOKIE_SECRET: ${{ secrets.BACKEND_COOKIE_SECRET }}
          REDIS_URL: ${{ secrets.BACKEND_REDIS_URL }}
          STORE_CORS: ${{ secrets.BACKEND_STORE_CORS }}
          ADMIN_CORS: ${{ secrets.BACKEND_ADMIN_CORS }}
          AUTH_CORS: ${{ secrets.BACKEND_AUTH_CORS }}


      - name: Sync ENV
        uses: appleboy/ssh-action@v1.0.3
        with:
          script: |
            ln -sf /root/organza-store-env/.env-backend /root/organza-store/backend/.env
            ln -sf /root/organza-store-env/.env-frontend  /root/organza-store/frontend/.env
            ln -sf /root/organza-store-env/.env-pos /root/organza-store/pos/.env

      - name: Install dependencies
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"
            cd /root/organza-store/backend
            if [ package.json -nt node_modules ]; then
              npm install
            fi

      - name: Build Medusa
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 20m
          script: |
            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"
            cd /root/organza-store/backend
            npx medusa build
            cd .medusa/server
            if [ /root/organza-store/backend/package.json -nt node_modules ]; then
              npm install
            fi
            cp /root/organza-store/backend/.env .env.production

      - name: Run migrations
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"
            cd /root/organza-store/backend/.medusa/server
            NODE_ENV=production npx medusa db:migrate
            NODE_ENV=production npx medusa db:sync-links

      - name: Restart Medusa
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"
            pm2 describe organza-store-backend > /dev/null 2>&1 \
              && pm2 reload /root/ecosystem.config.js --only organza-store-backend \
              || pm2 start /root/ecosystem.config.js --only organza-store-backend
            pm2 save