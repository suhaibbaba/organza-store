name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Pull latest code
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            if [ ! -d "/root/organza-store/.git" ]; then
              rm -rf /root/organza-store
              git clone git@github.com:suhaibbaba/organza-store.git /root/organza-store
            fi
            cd /root/organza-store
            git fetch origin main
            git reset --hard origin/main

      - name: Write .env file
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: BACKEND_URL,PUBLISHABLE_KEY,PUBLIC_BASE_URL,PUBLIC_DEFAULT_REGION,PUBLIC_STRIPE_KEY,PAYMENTS_PUBLISHABLE_KEY,REVALIDATE_SECRET,CLOUD_S3_HOSTNAME
          script: |
            cat > /root/organza-store-env/.env-frontend << EOF
            # Your Medusa backend, should be updated to where you are hosting your server. Remember to update CORS settings for your server. See – https://docs.medusajs.com/learn/configurations/medusa-config#httpstorecors
            MEDUSA_BACKEND_URL=$BACKEND_URL
            # Your publishable key that can be attached to sales channels. See - https://docs.medusajs.com/resources/storefront-development/publishable-api-keys
            NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=$PUBLISHABLE_KEY
            # Your store URL, should be updated to where you are hosting your storefront.
            NEXT_PUBLIC_BASE_URL=$PUBLIC_BASE_URL
            # Your preferred default region. When middleware cannot determine the user region from the "x-vercel-country" header, the default region will be used. ISO-2 lowercase format. 
            NEXT_PUBLIC_DEFAULT_REGION=$PUBLIC_DEFAULT_REGION
            # Your Stripe public key. See – https://docs.medusajs.com/resources/commerce-modules/payment/payment-provider/stripe
            NEXT_PUBLIC_STRIPE_KEY=$PUBLIC_STRIPE_KEY
            # Your Medusa payments publishable key. You can find it in your Medusa dashbard.
            NEXT_PUBLIC_MEDUSA_PAYMENTS_PUBLISHABLE_KEY=$PAYMENTS_PUBLISHABLE_KEY
            # Your Medusa payments external account ID. You can find it in your Medusa dashbard.
            NEXT_PUBLIC_MEDUSA_PAYMENTS_ACCOUNT_ID=$PAYMENTS_ACCOUNT_ID
            # Your Next.js revalidation secret. See – https://nextjs.org/docs/app/building-your-application/data-fetching/fetching-caching-and-revalidating#on-demand-revalidation
            REVALIDATE_SECRET=$REVALIDATE_SECRET
            # For Cloud users: add your Medusa Cloud S3 hostname and pathname to enable image optimization.
            MEDUSA_CLOUD_S3_HOSTNAME=$CLOUD_S3_HOSTNAME
            MEDUSA_CLOUD_S3_PATHNAME=$CLOUD_S3_PATHNAME
            PORT=4101
            EOF
            ln -sf /root/organza-store-env/.env-frontend /root/organza-store/frontend/.env
        env:
          BACKEND_URL: ${{ secrets.FRONTEND_MEDUSA_BACKEND_URL }}
          PUBLISHABLE_KEY: ${{ secrets.FRONTEND_NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
          PUBLIC_BASE_URL: ${{ secrets.FRONTEND_NEXT_PUBLIC_BASE_URL }}
          PUBLIC_DEFAULT_REGION: ${{ secrets.FRONTEND_NEXT_PUBLIC_DEFAULT_REGION }}
          PUBLIC_STRIPE_KEY: ${{ secrets.FRONTEND_PUBLIC_STRIPE_KEY }}
          PAYMENTS_PUBLISHABLE_KEY: ${{ secrets.FRONTEND_NEXT_PUBLIC_MEDUSA_PAYMENTS_PUBLISHABLE_KEY }}
          PAYMENTS_ACCOUNT_ID: ${{ secrets.FRONTEND_NEXT_PUBLIC_MEDUSA_PAYMENTS_ACCOUNT_ID }}
          REVALIDATE_SECRET: ${{ secrets.FRONTEND_REVALIDATE_SECRET }}
          CLOUD_S3_HOSTNAME: ${{ secrets.FRONTEND_MEDUSA_CLOUD_S3_HOSTNAME }}
          CLOUD_S3_PATHNAME: ${{ secrets.FRONTEND_MEDUSA_CLOUD_S3_PATHNAME }}

      - name: Sync ENV
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            bash /root/organza-store/.github/scripts/sync-env.sh

      - name: Install dependencies
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"
            cd /root/organza-store/frontend
            npm install

      - name: Build Next.js
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 20m
          script: |
            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"
            cd /root/organza-store/frontend
            npm run build

      - name: Restart Next.js
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"
            pm2 describe organza-store-frontend > /dev/null 2>&1 \
              && pm2 reload /root/ecosystem.config.js --only organza-store-frontend \
              || pm2 start /root/ecosystem.config.js --only organza-store-frontend
            pm2 save